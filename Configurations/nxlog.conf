## NXLog Community Edition - Full SOC Coverage
## Endpoint: 192.168.1.38 → Wazuh Manager: 192.168.1.201
##                        → SOC ELK Server: 192.168.1.70

define ROOT C:\Program Files\nxlog

Moduledir %ROOT%\modules
CacheDir  %ROOT%\data
Logfile   %ROOT%\data\nxlog.log
LogLevel  INFO

## ============================================================
## EXTENSION MODULE
## ============================================================
<Extension syslog>
    Module xm_syslog
</Extension>

## ============================================================
## INPUTS - EXISTING
## ============================================================

## Security Logs - Logins, Logoffs, Account Changes, File Access
<Input security_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Security">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## System Logs - Service start/stop, driver loads, OS events
<Input system_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="System">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## Application Logs - App crashes, errors, installs
<Input application_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Application">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## PowerShell Operational - Commands run, scripts executed
<Input powershell_operational>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Microsoft-Windows-PowerShell/Operational">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## PowerShell ScriptBlock - Full script content logging
<Input powershell_scriptblock>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Microsoft-Windows-PowerShell/Operational">\
                      *[System[(EventID=4104)]]</Select>\
                  </Query>\
                </QueryList>
</Input>

## Windows Defender - Malware detections, scan results
<Input defender_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Microsoft-Windows-Windows Defender/Operational">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## Task Scheduler - Scheduled task creation, execution
<Input task_scheduler>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Microsoft-Windows-TaskScheduler/Operational">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## Windows Firewall - Allowed/blocked connections
<Input firewall_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Microsoft-Windows-Windows Firewall With Advanced Security/Firewall">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## RDP - Remote Desktop connections
<Input rdp_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## Sysmon - Deep endpoint telemetry
<Input sysmon_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Microsoft-Windows-Sysmon/Operational">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## ============================================================
## INPUTS - NEW
## ============================================================

## WMI Activity - Lateral movement, malware execution via WMI
<Input wmi_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Microsoft-Windows-WMI-Activity/Operational">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## BITS Client - Malware download detection
<Input bits_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Microsoft-Windows-Bits-Client/Operational">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## Windows Remote Management - Remote execution abuse
<Input winrm_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Microsoft-Windows-WinRM/Operational">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## SMB Share Access - Lateral movement detection
<Input smb_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Security">\
                      *[System[(EventID=5140 or EventID=5145)]]</Select>\
                  </Query>\
                </QueryList>
</Input>

## Code Integrity - Driver and kernel tampering
<Input codeintegrity_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="Microsoft-Windows-CodeIntegrity/Operational">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## OpenSSH - SSH login attempts and connections
<Input openssh_logs>
    Module      im_msvistalog
    Query       <QueryList>\
                  <Query Id="0">\
                    <Select Path="OpenSSH/Operational">*</Select>\
                  </Query>\
                </QueryList>
</Input>

## ============================================================
## OUTPUT 1 - Wazuh Manager Ubuntu (192.168.1.201)
## ============================================================
<Output syslog_out>
    Module      om_tcp
    Host        192.168.1.201
    Port        514
    Exec        to_syslog_snare();
</Output>

## ============================================================
## OUTPUT 2 - SOC ELK Server (192.168.1.70)
## ============================================================
<Output syslog_out_elk>
    Module      om_tcp
    Host        192.168.1.70
    Port        5140
    Exec        to_syslog_snare();
</Output>

